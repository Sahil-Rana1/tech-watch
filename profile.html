<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | TechWatch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container py-5 mt-4">
        <div class="row g-4">
            <!-- Sidebar -->
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm p-4 text-center">
                    <div class="mb-4">
                        <img src="https://ui-avatars.com/api/?name=User&background=0D6EFD&color=fff&size=128"
                            alt="Avatar" class="rounded-circle shadow-sm" id="profile-avatar">
                    </div>
                    <h4 class="fw-bold mb-1" id="profile-name">User Name</h4>
                    <p class="text-muted small" id="profile-email">user@example.com</p>
                    <hr>
                    <div class="list-group list-group-flush text-start">
                        <a href="#orders" class="list-group-item list-group-item-action border-0 py-3 active"><i
                                class="bi bi-box-seam me-2"></i> My Orders</a>
                        <a href="wishlist.html" class="list-group-item list-group-item-action border-0 py-3"><i
                                class="bi bi-heart me-2"></i> Wishlist</a>
                        <a href="cart.html" class="list-group-item list-group-item-action border-0 py-3"><i
                                class="bi bi-cart me-2"></i> My Cart</a>
                        <a href="#" class="list-group-item list-group-item-action border-0 py-3 text-danger"
                            onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i> Logout</a>
                    </div>
                </div>
            </div>

            <!-- Content -->
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm p-4 h-100">
                    <h5 class="fw-bold mb-4">Order History</h5>
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead class="bg-light">
                                <tr>
                                    <th>Order ID</th>
                                    <th>Date</th>
                                    <th>Total</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="orders-body">
                                <!-- Orders rendered by JS -->
                            </tbody>
                        </table>
                    </div>
                    <div id="no-orders" class="text-center py-5 d-none">
                        <p class="text-muted">You haven't placed any orders yet.</p>
                        <a href="products.html" class="btn btn-outline-primary">Start Shopping</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { showToast } from './js/utils.js';

        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('profile-name').innerText = user.name;
            document.getElementById('profile-email').innerText = user.email;
            document.getElementById('profile-avatar').src = `https://ui-avatars.com/api/?name=${user.name}&background=0D6EFD&color=fff&size=128`;

            renderOrders();
        });

        const renderOrders = () => {
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            const body = document.getElementById('orders-body');
            const noOrders = document.getElementById('no-orders');

            if (orders.length === 0) {
                noOrders.classList.remove('d-none');
                body.parentElement.classList.add('d-none');
                return;
            }

            orders.reverse().forEach(order => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>#${order.id}</td>
                    <td>${order.date}</td>
                    <td class="fw-bold">${order.total}</td>
                    <td><span class="badge bg-success-subtle text-success">${order.status}</span></td>
                    <td><button class="btn btn-sm btn-outline-primary">View Details</button></td>
                `;
                body.appendChild(tr);
            });
        };
    </script>
</body>

</html>
