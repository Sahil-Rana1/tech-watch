<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TechWatch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

    <div class="container d-flex align-items-center justify-content-center min-vh-100 py-5">
        <div class="card border-0 shadow-lg p-4 p-md-5" style="max-width: 450px; width: 100%;">
            <div class="text-center mb-4">
                <a href="index.html" class="navbar-brand fs-1">TECHWATCH</a>
                <h3 class="fw-bold mt-3">Welcome Back</h3>
                <p class="text-muted">Sign in to continue to your account</p>
            </div>

            <form id="login-form">
                <div class="mb-3">
                    <label class="form-label fw-600">Email Address</label>
                    <input type="email" id="email" class="form-control form-control-lg" placeholder="name@example.com"
                        required>
                </div>
                <div class="mb-3">
                    <div class="d-flex justify-content-between">
                        <label class="form-label fw-600">Password</label>
                        <a href="#" class="text-decoration-none small">Forgot Password?</a>
                    </div>
                    <input type="password" id="password" class="form-control form-control-lg" placeholder="••••••••"
                        required>
                </div>
                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label" for="remember">Remember me</label>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">Sign In</button>

                <div class="text-center">
                    <p class="text-muted small">Don't have an account? <a href="register.html"
                            class="text-decoration-none fw-bold">Sign Up</a></p>
                </div>

                <div class="divider d-flex align-items-center my-4">
                    <hr class="flex-grow-1">
                    <span class="mx-3 text-muted small">OR CONTINUE WITH</span>
                    <hr class="flex-grow-1">
                </div>

                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-outline-secondary flex-grow-1"><i
                            class="bi bi-google me-2"></i> Google</button>
                    <button type="button" class="btn btn-outline-secondary flex-grow-1"><i class="bi bi-apple me-2"></i>
                        Apple</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>

</html>
