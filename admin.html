<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | TechWatch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

    <div class="container-fluid py-4">
        <div class="row g-4">
            <!-- Sidebar (Admin specific) -->
            <div class="col-md-3 col-lg-2">
                <div class="card border-0 shadow-sm p-3 h-100">
                    <h5 class="fw-bold mb-4 text-primary">ADMIN PANEL</h5>
                    <div class="nav flex-column nav-pills" role="tablist">
                        <button class="nav-link active text-start mb-2" data-bs-toggle="pill"
                            data-bs-target="#dashboard"><i class="bi bi-speedometer2 me-2"></i> Dashboard</button>
                        <button class="nav-link text-start mb-2" data-bs-toggle="pill" data-bs-target="#m-products"><i
                                class="bi bi-box-seam me-2"></i> Products</button>
                        <button class="nav-link text-start mb-2" data-bs-toggle="pill" data-bs-target="#m-orders"><i
                                class="bi bi-cart-check me-2"></i> All Orders</button>
                        <hr>
                        <a href="index.html" class="nav-link text-start text-dark"><i class="bi bi-arrow-left me-2"></i>
                            Back to Shop</a>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-9 col-lg-10">
                <div class="tab-content">
                    <!-- Dashboard Tab -->
                    <div class="tab-pane fade show active" id="dashboard">
                        <div class="row g-4 mb-4">
                            <div class="col-md-4">
                                <div class="card border-0 shadow-sm p-4 bg-primary text-white h-100">
                                    <h6>Total Sales</h6>
                                    <h2 class="fw-bold mb-0" id="total-sales-val">$12,450</h2>
                                    <small>+15% from last month</small>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="card border-0 shadow-sm p-4 bg-dark text-white h-100">
                                    <h6>Total Orders</h6>
                                    <h2 class="fw-bold mb-0" id="total-orders-val">156</h2>
                                    <small>24 pending delivery</small>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="card border-0 shadow-sm p-4 bg-white h-100">
                                    <h6>Active Products</h6>
                                    <h2 class="fw-bold mb-0 text-primary" id="total-products-val">45</h2>
                                    <small>8 categories</small>
                                </div>
                            </div>
                        </div>

                        <div class="row g-4">
                            <div class="col-lg-8">
                                <div class="card border-0 shadow-sm p-4">
                                    <h5 class="fw-bold mb-4">Sales Analytics</h5>
                                    <canvas id="salesChart" height="300"></canvas>
                                </div>
                            </div>
                            <div class="col-lg-4">
                                <div class="card border-0 shadow-sm p-4 h-100">
                                    <h5 class="fw-bold mb-4">Recent Orders</h5>
                                    <div id="recent-orders-list">
                                        <!-- Recent orders -->
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Products Management Tab -->
                    <div class="tab-pane fade" id="m-products">
                        <div class="card border-0 shadow-sm p-4">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <h5 class="fw-bold mb-0">Manage Products</h5>
                                <button class="btn btn-primary" data-bs-toggle="modal"
                                    data-bs-target="#addProductModal"><i class="bi bi-plus-lg me-1"></i> Add
                                    Product</button>
                            </div>
                            <div class="table-responsive">
                                <table class="table align-middle">
                                    <thead class="bg-light">
                                        <tr>
                                            <th>Product</th>
                                            <th>Category</th>
                                            <th>Price</th>
                                            <th>Stock</th>
                                            <th>Action</th>
                                        </tr>
                                    </thead>
                                    <tbody id="admin-products-body">
                                        <!-- Products -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- Orders Tab -->
                    <div class="tab-pane fade" id="m-orders">
                        <div class="card border-0 shadow-sm p-4">
                            <h5 class="fw-bold mb-4">Customer Orders</h5>
                            <!-- Similar table as user profile but for all -->
                            <div class="table-responsive">
                                <table class="table align-middle">
                                    <thead class="bg-light">
                                        <tr>
                                            <th>Order ID</th>
                                            <th>Customer</th>
                                            <th>Date</th>
                                            <th>Total</th>
                                            <th>Status</th>
                                        </tr>
                                    </thead>
                                    <tbody id="admin-orders-body">
                                        <!-- All orders -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Product Modal -->
    <div class="modal fade" id="addProductModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Add New Product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="add-product-form">
                        <div class="mb-3">
                            <label class="form-label">Product Name</label>
                            <input type="text" class="form-control" required id="p-name">
                        </div>
                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label">Category</label>
                                <select class="form-select" id="p-cat">
                                    <option>Laptops</option>
                                    <option>Smartphones</option>
                                    <option>Accessories</option>
                                </select>
                            </div>
                            <div class="col">
                                <label class="form-label">Price</label>
                                <input type="number" step="0.01" class="form-control" required id="p-price">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Image URL</label>
                            <input type="text" class="form-control" required id="p-img" placeholder="https://...">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Stock Quantity</label>
                            <input type="number" class="form-control" required id="p-stock">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Save Product</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/admin.js"></script>
</body>

</html>
