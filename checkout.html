<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | TechWatch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container py-4 py-lg-5 mt-4 mt-lg-5">
        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none">Home</a></li>
                <li class="breadcrumb-item"><a href="cart.html" class="text-decoration-none">Cart</a></li>
                <li class="breadcrumb-item active" aria-current="page">Checkout</li>
            </ol>
        </nav>

        <div class="d-flex flex-column flex-md-row align-items-start align-items-md-center mb-4 mb-lg-5">
            <div class="bg-primary bg-opacity-10 rounded-4 me-md-3 mb-3 mb-md-0 d-flex align-items-center justify-content-center"
                style="width: 60px; height: 60px;">
                <i class="bi bi-shield-lock-fill text-primary fs-3"></i>
            </div>
            <div>
                <h2 class="fw-800 mb-1 fs-3">Secure Checkout</h2>
                <p class="text-muted mb-0 small">Review your items and complete your purchase securely.</p>
            </div>
        </div>

        <form id="checkout-form" class="needs-validation" novalidate>
            <div class="row g-4 g-lg-5">
                <!-- Shipping Details -->
                <div class="col-lg-8 order-2 order-lg-1">
                    <div class="card border-0 shadow-sm p-3 p-md-4 mb-4">
                        <h5 class="fw-bold mb-4 checkout-section-title">Shipping Information</h5>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">First Name</label>
                                <input type="text" class="form-control" required>
                                <div class="invalid-feedback">Required.</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Last Name</label>
                                <input type="text" class="form-control" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" required placeholder="you@example.com">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Address</label>
                                <input type="text" class="form-control" required placeholder="1234 Main St">
                            </div>
                            <!-- <div class="col-md-5">
                                <label class="form-label">Country</label>
                                <select class="form-select" required>
                                    <option value="">Choose...</option>
                                    <option>United States</option>
                                    <option>Canada</option>
                                    <option>India</option>
                                    <option>Germany</option>
                                </select>
                            </div> -->
                            <div class="col-md-4">
                                <label class="form-label">State</label>
                                <input type="text" class="form-control" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Zip Code</label>
                                <input type="text" class="form-control" required>
                            </div>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm p-3 p-md-4 mb-4">
                        <h5 class="fw-bold mb-4 checkout-section-title">Payment Method</h5>
                        <div class="my-3">
                            <div class="form-check mb-2">
                                <input id="credit" name="paymentMethod" type="radio" class="form-check-input" checked
                                    required>
                                <label class="form-check-label" for="credit">Credit Card</label>
                            </div>
                            <div class="form-check mb-2">
                                <input id="debit" name="paymentMethod" type="radio" class="form-check-input" required>
                                <label class="form-check-label" for="debit">Debit Card</label>
                            </div>
                            <div class="form-check">
                                <input id="paypal" name="paymentMethod" type="radio" class="form-check-input" required>
                                <label class="form-check-label" for="paypal">PayPal</label>
                            </div>
                        </div>
                        <div class="row gy-3">
                            <div class="col-md-6">
                                <label class="form-label">Name on Card</label>
                                <input type="text" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Card Number</label>
                                <input type="text" class="form-control" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Expiration</label>
                                <input type="text" class="form-control" placeholder="MM/YY" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">CVV</label>
                                <input type="text" class="form-control" required>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Order Summary -->
                <div class="col-lg-4 order-1 order-lg-2">
                    <div class="card border-0 shadow-sm p-3 p-md-4 sticky-lg-top" style="top: 100px;">
                        <h5 class="fw-bold mb-4 checkout-section-title">Your Order</h5>
                        <div id="checkout-items" class="mb-4">
                            <!-- Items list -->
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between mb-4">
                            <span class="fs-5 fw-bold">Total</span>
                            <span id="checkout-total" class="fs-5 fw-bold text-primary">₹0</span>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100">Place Order</button>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <!-- Order Success Modal -->
    <div class="modal fade" id="successModal" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center p-5 border-0">
                <div class="mb-4">
                    <i class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
                </div>
                <h2 class="fw-bold mb-3">Order Placed!</h2>
                <p class="text-muted mb-4">Thank you for your purchase. Your order #<span id="order-id"></span> has been
                    successfully placed.</p>
                <div class="d-grid">
                    <button class="btn btn-primary btn-lg" onclick="location.href='index.html'">Continue
                        Shopping</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/checkout.js"></script>
</body>

</html>
