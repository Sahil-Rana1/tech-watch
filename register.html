<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | TechWatch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

    <div class="container d-flex align-items-center justify-content-center min-vh-100 py-5">
        <div class="card border-0 shadow-lg p-4 p-md-5" style="max-width: 500px; width: 100%;">
            <div class="text-center mb-4">
                <a href="index.html" class="navbar-brand fs-1">TECHWATCH</a>
                <h3 class="fw-bold mt-3">Create Account</h3>
                <p class="text-muted">Join the elite tech community today</p>
            </div>

            <form id="register-form">
                <div class="row g-3 mb-3">
                    <div class="col-md-12">
                        <label class="form-label fw-600">Full Name</label>
                        <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-600">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-600">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Minimum 8 characters"
                        required>
                </div>
                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="terms" required>
                    <label class="form-check-label small" for="terms">I agree to the <a href="#">Terms &
                            Conditions</a></label>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">Create Account</button>

                <div class="text-center">
                    <p class="text-muted small">Already have an account? <a href="login.html"
                            class="text-decoration-none fw-bold">Sign In</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>

</html>
