<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | TechWatch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container py-5 mt-4">
        <h2 class="fw-bold mb-4">Shopping Cart</h2>

        <div class="row g-4">
            <!-- Cart Items -->
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm p-4">
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead class="text-muted">
                                <tr>
                                    <th>Product</th>
                                    <th>Price</th>
                                    <th>Quantity</th>
                                    <th>Total</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="cart-items-body">
                                <!-- Cart items rendered by JS -->
                            </tbody>
                        </table>
                    </div>
                    <div id="empty-cart-msg" class="text-center py-5 d-none">
                        <i class="bi bi-cart-x display-1 text-muted mb-3"></i>
                        <h4>Your cart is empty</h4>
                        <a href="products.html" class="btn btn-primary mt-3">Go Shopping</a>
                    </div>
                </div>
            </div>

            <!-- Order Summary -->
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm p-4 sticky-top" style="top: 100px;">
                    <h5 class="fw-bold mb-4">Order Summary</h5>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Subtotal</span>
                        <span id="cart-subtotal" class="fw-600">₹0</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Shipping</span>
                        <span id="cart-shipping" class="fw-600 text-success">Free</span>
                    </div>
                    <div class="d-flex justify-content-between mb-4">
                        <span>Tax (Estimated)</span>
                        <span id="cart-tax" class="fw-600">₹0</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between mb-4">
                        <span class="fs-5 fw-bold">Total</span>
                        <span id="cart-total" class="fs-5 fw-bold text-primary">₹0</span>
                    </div>

                    <!-- Coupon -->
                    <div class="mb-4">
                        <div class="input-group">
                            <input type="text" class="form-control" placeholder="Promo code" id="coupon-code">
                            <button class="btn btn-outline-primary" id="apply-coupon">Apply</button>
                        </div>
                    </div>

                    <a href="checkout.html" class="btn btn-primary btn-lg w-100" id="checkout-btn">Proceed to
                        Checkout</a>

                    <div class="mt-4 text-center">
                        <div class="d-flex justify-content-center gap-3">
                            <i class="bi bi-credit-card fs-4"></i>
                            <i class="bi bi-paypal fs-4"></i>
                            <i class="bi bi-google fs-4"></i>
                        </div>
                        <p class="text-muted small mt-2">Secure checkout with SSL encryption</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/cart.js"></script>
</body>

</html>
